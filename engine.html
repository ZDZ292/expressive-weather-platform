<!DOCTYPE html>d
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlateWeather Workstation</title>
    <!-- Tailwind CSS for sleek, ultra-modern UI styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Leaflet CSS & JS for advanced radar & polygon mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Custom dark-mode glassmorphism and UI refinements */
        body {
            background-color: #0b0f19;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Style adjustments to make the radar map feel tactical */
        .leaflet-container {
            background: #0f172a !important;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col overflow-hidden">

    <!-- Top Header Navigation Bar -->
    <header class="glass-panel h-16 px-6 flex items-center justify-between border-b border-slate-800 z-10 shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
            <h1 class="text-lg font-black tracking-wider uppercase bg-gradient-to-r from-slate-100 to-slate-400 bg-clip-text text-transparent">
                SlateWeather <span class="text-xs font-semibold px-2 py-0.5 bg-slate-800 text-slate-400 rounded-md border border-slate-700 ml-2">v2.0</span>
            </h1>
        </div>
        
        <!-- Live Precision Clock Panel -->
        <div class="flex items-center space-x-4">
            <div class="text-right">
                <div id="live-clock" class="text-xl font-mono font-bold tracking-tight text-emerald-400">00:00:00</div>
                <div id="live-date" class="text-xxs uppercase tracking-widest text-slate-400 font-semibold">LOADING UTC...</div>
            </div>
        </div>
    </header>

    <!-- Main Workspace Matrix -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- Left Sidebar: Active Severe Weather Alerts Feed -->
        <section class="w-80 glass-panel border-r border-slate-800 flex flex-col z-10">
            <div class="p-4 border-b border-slate-800 bg-slate-900/50 flex items-center justify-between">
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                    <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                    Live NWS Hazards
                </h2>
                <span id="alert-count" class="text-xs font-mono bg-slate-800 px-2 py-0.5 rounded text-slate-300 border border-slate-700">0</span>
            </div>
            <!-- Dynamic Alert Feed Container -->
            <div id="alert-feed" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                <div class="text-sm text-slate-500 text-center py-8 font-medium">Listening for convective hazards...</div>
            </div>
        </section>

        <!-- Right Viewport: Interactive Tactical Radar Display -->
        <section id="map" class="flex-1 h-full z-0"></section>
        
    </main>

    <script>
        // --- PRECISION LIVE CLOCK ENGINE ---
        function updateClock() {
            const now = new Date();
            
            // Format time accurately
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Format Date and include exact UTC offset tracking
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            const localDate = now.toLocaleDateString('en-US', options);
            const utcString = `UTC ${now.toUTCString().slice(17, 22)}`;
            document.getElementById('live-date').textContent = `${localDate} | ${utcString}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- INTERACTIVE RADAR & MAP INITIALIZATION ---
        // Defaults coordinates centered near Northern Illinois / Chicago metro area
        const map = L.map('map', {
            center: [42.0451, -87.6877],
            zoom: 7,
            zoomControl: false
        });

        // Add sleek zoom control to top right corner out of the way
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Dark, minimalist basemap tileset to make weather parameters stand out
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Modern, operational NWS MRMS Base Reflectivity Radar Layer
        const radarLayer = L.tileLayer.wms('https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qcd/wms', {
            layers: 'conus_bref_qcd',
            format: 'image/png',
            transparent: true,
            opacity: 0.65,
            attribution: 'NOAA / NCEP MRMS'
        }).addTo(map);

        // --- REAL-TIME NWS ACTIVE ALERTS & POLYGON ENGINE ---
        let alertLayersGroup = L.layerGroup().addTo(map);

        // Color designations based on official NWS directives for severe hazards
        const hazardColors = {
            "Tornado Warning": "#FF0000",
            "Severe Thunderstorm Warning": "#FFA500",
            "Flash Flood Warning": "#8B0000",
            "Special Marine Warning": "#FFA07A"
        };

        async function fetchLiveAlerts() {
            try {
                // Fetch active storm-based warnings directly from the NWS API
                const response = await fetch('https://api.weather.gov/alerts/active?status=actual&event=Tornado%20Warning,Severe%20Thunderstorm%20Warning,Flash%20Flood%20Warning,Special%20Marine%20Warning');
                const data = await response.json();
                
                // Clear out existing plotted layers to maintain peak tracking accuracy
                alertLayersGroup.clearLayers();
                const feedContainer = document.getElementById('alert-feed');
                feedContainer.innerHTML = '';
                
                const features = data.features || [];
                document.getElementById('alert-count').textContent = features.length;

                if (features.length === 0) {
                    feedContainer.innerHTML = `<div class="text-sm text-slate-500 text-center py-8">No active severe convective warnings found.</div>`;
                    return;
                }

                features.forEach(alert => {
                    const props = alert.properties;
                    const eventType = props.event;
                    const color = hazardColors[eventType] || '#38bdf8'; // Fallback telemetry color
                    
                    // 1. Process and append data item to Left Sidebar feed
                    const alertCard = document.createElement('div');
                    alertCard.className = 'p-3 rounded-lg bg-slate-900/80 border-l-4 shadow-md hover:bg-slate-800/80 transition cursor-pointer';
                    alertCard.style.borderColor = color;
                    alertCard.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="text-xs font-bold uppercase tracking-wide" style="color: ${color}">${eventType}</span>
                            <span class="text-xxs font-mono text-slate-500">${props.parameters.NWSheadline ? props.parameters.NWSheadline[0].slice(-8) : ''}</span>
                        </div>
                        <p class="text-sm font-semibold text-slate-200 mt-1">${props.areaDesc}</p>
                        <p class="text-xs text-slate-400 mt-1 line-clamp-2">${props.instruction || 'No explicit tracking instructions provided.'}</p>
                    `;
                    
                    // Fly to polygon when user clicks sidebar card
                    alertCard.addEventListener('click', () => {
                        if (alert.geometry) {
                            const geoJsonLayer = L.geoJSON(alert);
                            map.fitBounds(geoJsonLayer.getBounds(), { padding: [50, 50], maxZoom: 10 });
                        }
                    });
                    feedContainer.appendChild(alertCard);

                    // 2. Plot warning polygon shape on top of the interactive radar map
                    if (alert.geometry) {
                        L.geoJSON(alert, {
                            style: {
                                color: color,
                                weight: 2.5,
                                fillOpacity: 0.1,
                                dashArray: '4, 4'
                            }
                        }).bindPopup(`
                            <div class="text-slate-900 font-sans p-1">
                                <b class="text-sm uppercase" style="color:${color}">${eventType}</b><br/>
                                <span class="text-xs font-semibold">${props.headline}</span><br/>
                                <p class="text-xs mt-1 text-slate-600 max-h-32 overflow-y-auto">${props.description}</p>
                            </div>
                        `).addTo(alertLayersGroup);
                    }
                });

            } catch (error) {
                console.error("Critical error parsing telemetry from NWS API server: ", error);
                document.getElementById('alert-feed').innerHTML = `<div class="text-xs text-red-400 text-center py-4">API stream error. Re-attempting handshake...</div>`;
            }
        }

        // Auto-refresh the live alert layers and sidebar sequence every 60 seconds
        fetchLiveAlerts();
        setInterval(fetchLiveAlerts, 60000);
    </script>
</body>
</html>
