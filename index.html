<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expressive Weather Platform</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --app-bg: #101524;
            --surface-blur: rgba(20, 28, 48, 0.75);
            --surface-card: #1c253c;
            --text-main: #ffffff;
            --text-sub: #9aa8c2;
            --accent-blue: #2f80ed;
            --risk-slight: #f2c94c;
            --risk-enhanced: #e28743;
            --risk-mod: #eb5757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Weather Canvas Dynamically Driven Background */
        .weather-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #3a7bd5 0%, #3a6073 100%);
            z-index: -1;
            transition: background 1s ease;
        }

        /* Mobile Container Viewport Setup */
        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 16px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Header Location Selector */
        .location-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .search-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 4px 14px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-bar input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 8px;
            font-size: 0.95rem;
        }

        .search-bar input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .search-bar i { color: white; cursor: pointer; }

        .active-city-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            align-self: flex-start;
            font-weight: 600;
            font-size: 0.9rem;
            gap: 6px;
        }

        /* Hero Current Weather Frame */
        .current-hero {
            text-align: center;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .current-hero .temp-display {
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1;
            position: relative;
            margin-left: 15px;
        }
        .current-hero .temp-display::after {
            content: "°";
            position: absolute;
            top: 5px;
            right: -25px;
        }

        .current-hero .condition-text {
            font-size: 1.25rem;
            font-weight: 500;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .current-hero .condition-text i {
            font-size: 1.4rem;
        }

        .current-hero .hi-lo {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 6px;
            font-weight: 500;
        }

        /* App Main Content Cards */
        .weather-card {
            background: var(--surface-card);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .card-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 14px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Premium Hourly Horizontal Scroll Scrubber */
        .hourly-scrubber {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .hourly-scrubber::-webkit-scrollbar { display: none; }

        .hourly-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 55px;
            gap: 8px;
        }
        .hourly-item .time { font-size: 0.8rem; color: var(--text-sub); font-weight: 500; }
        .hourly-item i { font-size: 1.3rem; color: #fff; }
        .hourly-item .pop { font-size: 0.7rem; color: #56ccf2; font-weight: 700; }
        .hourly-item .temp { font-size: 1rem; font-weight: 600; }

        /* Daily Row Lists */
        .daily-list { display: flex; flex-direction: column; gap: 12px; }
        .daily-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .daily-row:last-child { border-bottom: none; padding-bottom: 0; }
        .daily-row .day-name { width: 85px; font-weight: 600; font-size: 0.95rem; }
        .daily-row .day-icon-group { display: flex; align-items: center; gap: 8px; width: 60px; justify-content: center; }
        .daily-row .day-icon-group i { font-size: 1.25rem; }
        .daily-row .day-pop { font-size: 0.75rem; color: #56ccf2; font-weight: 700; width: 35px; text-align: left; }
        .daily-row .day-temps { text-align: right; font-weight: 600; font-size: 0.95rem; width: 70px; }
        .daily-row .day-temps .low { color: var(--text-sub); font-weight: 400; margin-left: 6px; }

        /* Full Screen Media Views (Radar and SPC Options) */
        .media-viewport {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4 / 3;
        }
        .media-viewport img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* View Router Management States */
        .app-view-panel { display: none; flex-direction: column; gap: 16px; }
        .app-view-panel.active-view { display: flex; }

        /* The Weather Channel Style App Bottom Navigation Dock */
        .bottom-nav-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            background: #0f1422;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 999;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
        }

        .nav-dock-item {
            background: transparent;
            border: none;
            color: var(--text-sub);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            width: 60px;
            transition: color 0.2s;
        }

        .nav-dock-item i { font-size: 1.25rem; }
        .nav-dock-item.active-tab { color: var(--accent-blue); }

        /* Clean State Messages */
        .null-state-handler {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-sub);
        }
        .null-state-handler i { font-size: 2.5rem; margin-bottom: 12px; color: var(--accent-blue); }
    </style>
</head>
<body>

    <div class="weather-canvas" id="canvas-layer"></div>

    <div class="app-container">
        
        <div class="location-header">
            <div class="search-bar">
                <input type="text" id="target-search-field" placeholder="Search for city or zip code...">
                <i class="fa-solid fa-magnifying-glass" onclick="triggerGeocodePipeline()"></i>
            </div>
            <div class="active-city-pill" id="display-location-label">
                <i class="fa-solid fa-location-crosshairs"></i> Awaiting Target Loc Lock
            </div>
        </div>

        <div id="view-home" class="app-view-panel active-view">
            <div class="current-hero">
                <div class="temp-display" id="hero-temp">--</div>
                <div class="condition-text" id="hero-condition"><i class="fa-solid fa-cloud-sun"></i> Ready To Target</div>
                <div class="hi-lo" id="hero-hilo">Lock location above for processing</div>
            </div>

            <div class="weather-card">
                <div class="card-title">Hourly Forecast</div>
                <div class="hourly-scrubber" id="container-hourly-scrubber">
                    <div class="null-state-handler"><p>No live data stream loaded.</p></div>
                </div>
            </div>

            <div class="weather-card">
                <div class="card-title">Daily Forecast</div>
                <div class="daily-list" id="container-daily-stack">
                    <div class="null-state-handler"><p>No live data stream loaded.</p></div>
                </div>
            </div>
        </div>

        <div id="view-radar" class="app-view-panel">
            <div class="weather-card">
                <div class="card-title" id="radar-title-id">NEXRAD Doppler Feed</div>
                <div class="media-viewport">
                    <img id="radar-image-stream" src="https://radar.weather.gov/ridge/standard/CONUS_LOOP.gif" alt="Radar Feed Grid">
                </div>
            </div>
        </div>

        <div id="view-storms" class="app-view-panel">
            <div class="weather-card">
                <div class="card-title">SPC Day 1 Convective Outlook</div>
                <div class="media-viewport">
                    <img src="https://www.spc.noaa.gov/products/outlook/day1otlk.gif" alt="Day 1 Outlook Layer">
                </div>
            </div>
            <div class="weather-card">
                <div class="card-title">SPC Day 2 Convective Outlook</div>
                <div class="media-viewport">
                    <img src="https://www.spc.noaa.gov/products/outlook/day2otlk.gif" alt="Day 2 Outlook Layer">
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav-dock">
        <button class="nav-dock-item active-tab" onclick="switchAppViewFrame('view-home', this)">
            <i class="fa-solid fa-house-chimney"></i>Home
        </button>
        <button class="nav-dock-item" onclick="switchAppViewFrame('view-storms', this)">
            <i class="fa-solid fa-cloud-bolt"></i>Storms
        </button>
        <button class="nav-dock-item" onclick="switchAppViewFrame('view-radar', this)">
            <i class="fa-solid fa-compass-drafting"></i>Radar
        </button>
    </div>

    <script>
        let globalLat = null;
        let globalLon = null;

        // Formats FontAwesome icon sets explicitly matching The Weather Channel UI choices
        function mapWeatherChannelIcons(nwsShortForecast) {
            const text = nwsShortForecast.toLowerCase();
            if (text.includes("thunderstorm") || text.includes("severe") || text.includes("tstorm")) {
                return { icon: "fa-solid fa-cloud-lightning", color: "#f2c94c", bg: "linear-gradient(180deg, #2c3e50 0%, #000000 100%)" };
            }
            if (text.includes("heavy rain") || text.includes("downpour")) {
                return { icon: "fa-solid fa-cloud-showers-heavy", color: "#76a0d0", bg: "linear-gradient(180deg, #4f5f76 0%, #111e2e 100%)" };
            }
            if (text.includes("rain") || text.includes("showers")) {
                return { icon: "fa-solid fa-cloud-rain", color: "#8cb3e2", bg: "linear-gradient(180deg, #617b96 0%, #263545 100%)" };
            }
            if (text.includes("snow") || text.includes("ice") || text.includes("flurries")) {
                return { icon: "fa-solid fa-snowflake", color: "#ffffff", bg: "linear-gradient(180deg, #758296 0%, #404b5a 100%)" };
            }
            if (text.includes("mostly cloudy") || text.includes("overcast")) {
                return { icon: "fa-solid fa-cloud", color: "#dfdfdf", bg: "linear-gradient(180deg, #576d94 0%, #202d42 100%)" };
            }
            if (text.includes("partly cloudy") || text.includes("scattered")) {
                return { icon: "fa-solid fa-cloud-sun", color: "#ffdb6d", bg: "linear-gradient(180deg, #4a86df 0%, #1b3358 100%)" };
            }
            if (text.includes("windy") || text.includes("breezy")) {
                return { icon: "fa-solid fa-wind", color: "#e0e0e0", bg: "linear-gradient(180deg, #3a6073 0%, #16222f 100%)" };
            }
            // Clear / Sunny Default Condition Match Frame
            return { icon: "fa-solid fa-sun", color: "#ffb923", bg: "linear-gradient(180deg, #4da4e0 0%, #a2cbf7 100%)" };
        }

        function switchAppViewFrame(targetId, buttonElement) {
            document.querySelectorAll('.app-view-panel').forEach(view => view.classList.remove('active-view'));
            document.querySelectorAll('.nav-dock-item').forEach(item => item.classList.remove('active-tab'));
            
            document.getElementById(targetId).classList.add('active-view');
            buttonElement.classList.add('active-tab');
        }

        async function triggerGeocodePipeline() {
            const inputVal = document.getElementById('target-search-field').value.trim();
            if (!inputVal) return;

            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(inputVal)}&count=1&language=en&format=json`);
                const data = await res.json();

                if (!data.results || data.results.length === 0) {
                    alert("Location context not resolved.");
                    return;
                }

                const location = data.results[0];
                globalLat = parseFloat(location.latitude).toFixed(2);
                globalLon = parseFloat(location.longitude).toFixed(2);

                document.getElementById('display-location-label').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${location.name}, ${location.admin1 || ''}`;
                document.getElementById('target-search-field').value = "";

                executeUnifiedForecastPipeline();
            } catch (err) {
                console.error("Geocoding step error out execution line: ", err);
            }
        }

        async function executeUnifiedForecastPipeline() {
            if (!globalLat || !globalLon) return;

            try {
                const pointsResponse = await fetch(`https://api.weather.gov/points/${globalLat},${globalLon}`);
                const pointsData = await pointsResponse.json();

                // Bind radar graphic loops directly out of local WSR-88D stations
                const radarStation = pointsData.properties.radarStation.toUpperCase();
                document.getElementById('radar-title-id').innerText = `${radarStation} NEXRAD Base Reflectivity`;
                document.getElementById('radar-image-stream').src = `https://radar.weather.gov/ridge/standard/${radarStation}_LOOP.gif`;

                const dailyEndpoint = pointsData.properties.forecast;
                const hourlyEndpoint = pointsData.properties.forecastHourly;

                // Fire async fetch handlers in parallel pipelines
                const [dailyRes, hourlyRes] = await Array.from(
                    await Promise.all([fetch(dailyEndpoint), fetch(hourlyEndpoint)]),
                    response => response.json()
                );

                renderAppHeroForecast(dailyRes.properties.periods[0]);
                renderAppHourlyScrubber(hourlyRes.properties.periods);
                renderAppDailyStack(dailyRes.properties.periods);

            } catch (err) {
                console.error("Critical architecture error processing NWS stream: ", err);
            }
        }

        function renderAppHeroForecast(currentPeriod) {
            document.getElementById('hero-temp').innerText = currentPeriod.temperature;
            
            const mapping = mapWeatherChannelIcons(currentPeriod.shortForecast);
            document.getElementById('hero-condition').innerHTML = `<i class="${mapping.icon}" style="color: ${mapping.color}"></i> ${currentPeriod.shortForecast}`;
            document.getElementById('canvas-layer').style.background = mapping.bg;
        }

        function renderAppHourlyScrubber(periods) {
            const container = document.getElementById('container-hourly-scrubber');
            container.innerHTML = "";

            // Render out the upcoming 24 hours exactly
            for (let i = 0; i < 24; i++) {
                const p = periods[i];
                const timeStr = new Date(p.startTime).toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
                const mapping = mapWeatherChannelIcons(p.shortForecast);
                const popValue = p.probabilityOfPrecipitation?.value || 0;

                const hourBlock = document.createElement('div');
                hourBlock.className = 'hourly-item';
                hourBlock.innerHTML = `
                    <span class="time">${timeStr}</span>
                    <i class="${mapping.icon}" style="color: ${mapping.color}"></i>
                    <span class="pop">${popValue > 0 ? popValue + '%' : ''}</span>
                    <span class="temp">${p.temperature}°</span>
                `;
                container.appendChild(hourBlock);
            }
        }

        function renderAppDailyStack(periods) {
            const container = document.getElementById('container-daily-stack');
            container.innerHTML = "";

            const dailyGroups = [];
            // Group weather.gov day/night splits cleanly to match Commercial Daily UI elements
            periods.forEach(p => {
                if (p.isDaytime) {
                    dailyGroups.push({
                        day: p.name,
                        iconText: p.shortForecast,
                        high: p.temperature,
                        pop: p.probabilityOfPrecipitation?.value || 0,
                        low: '--'
                    });
                } else if (dailyGroups.length > 0) {
                    dailyGroups[dailyGroups.length - 1].low = p.temperature;
                }
            });

            dailyGroups.forEach(g => {
                const row = document.createElement('div');
                row.className = 'daily-row';
                const mapping = mapWeatherChannelIcons(g.iconText);

                row.innerHTML = `
                    <div class="day-name">${g.day}</div>
                    <div class="day-icon-group">
                        <i class="${mapping.icon}" style="color: ${mapping.color}"></i>
                    </div>
                    <div class="day-pop">${g.pop > 5 ? g.pop + '%' : ''}</div>
                    <div class="day-temps">
                        <span>${g.high}°</span><span class="low">${g.low}°</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }
    </script>
</body>
</html>
