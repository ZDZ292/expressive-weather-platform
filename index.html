<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlateWeather PRO - Tactical Matrix</title>
    <style>
        /* Modern Onyx Black & Desert Sand Palette */
        :root {
            --bg-main: #0b0b0b;        /* Deep Onyx Black */
            --bg-panel: #141414;       /* Slightly lighter charcoal panel */
            --border-glow: #c2a67a;    /* Muted Desert Sand gold */
            --text-primary: #f5f5f7;   /* Stark off-white */
            --text-muted: #8e8e93;      /* Tactical gray */
            --text-accent: #d4af37;     /* Desert Sun amber */
            --text-alert: #ff453a;      /* Warning crimson */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            box-sizing: border-box;
            letter-spacing: -0.02em;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 32px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(194, 166, 122, 0.15);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            margin: 0;
        }

        .status-badge {
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(194, 166, 122, 0.1);
            color: var(--border-glow);
            padding: 6px 12px;
            border: 1px solid rgba(194, 166, 122, 0.3);
            border-radius: 4px;
            text-transform: uppercase;
        }

        .grid-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 3px solid var(--border-glow);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }

        .panel:hover {
            border-top-color: var(--text-accent);
        }

        .panel-title {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .matrix-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .status-hero {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.03em;
        }

        .twc-icon {
            width: 72px;
            height: 72px;
            opacity: 0.85;
            filter: drop-shadow(0 0 8px rgba(194, 166, 122, 0.2));
        }

        .data-table {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .data-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .data-value {
            color: var(--text-accent);
            font-weight: 600;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Tactical Weather Matrix</h1>
        </div>
        <div class="status-badge" id="system-status">SYS: SYNCING</div>
    </header>

    <main class="grid-container">
        <section class="panel">
            <h2 class="panel-title">Mesoscale Environment</h2>
            
            <div class="matrix-display">
                <div class="status-hero" id="hero-status">--</div>
                <img id="twc-condition-icon" class="twc-icon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Icon Layer">
            </div>
            
            <div class="data-table">
                <div class="data-row">
                    <span class="data-label">Convective Corridor</span>
                    <span class="data-value" id="meso-corridor">Initializing...</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Hail Probability</span>
                    <span class="data-value" id="hail-prob">--%</span>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2 class="panel-title">Radar Vortex Tracking</h2>
            
            <div class="data-table" style="margin-top: 10px;">
                <div class="data-row">
                    <span class="data-label">Vortex Coordinates</span>
                    <span class="data-value" id="vortex-coords">--</span>
                </div>
                <div class="data-row">
                    <span class="data-label">System Mode</span>
                    <span class="data-value" id="sys-mode" style="color: var(--text-primary);">STANDBY</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        // TWC Code Translation Matrix mapping incoming payload strings to numeric codes
        function getTWCCode(analysisStr) {
            if (!analysisStr) return "44";
            const text = analysisStr.toLowerCase();
            
            if (text.includes("tornado") || text.includes("vortex")) return "00";
            if (text.includes("severe") || text.includes("hail")) return "03";
            if (text.includes("convective") || text.includes("storm") || text.includes("thunder")) return "04";
            if (text.includes("rain") || text.includes("shower")) return "12";
            if (text.includes("cloudy")) return "26";
            if (text.includes("clear") || text.includes("sunny")) return "32";
            
            return "44"; 
        }

        function updateTWCIcon(analysisStr) {
            const iconCode = getTWCCode(analysisStr);
            // Developer URL syntax structure targeting weather.com assets
            document.getElementById('twc-condition-icon').src = `https://www.weather.com/wximage/wxdigitalicons/${iconCode}.png`;
        }

        async function fetchMatrixCache() {
            try {
                // Point to your exact repository cache payload
                const response = await fetch('live_weather_cache.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                
                const data = await response.json();

                // 1. Core Node Injection
                document.getElementById('system-status').innerText = `SYS: ${data.status}`;
                document.getElementById('hero-status').innerText = data.status;
                document.getElementById('sys-mode').innerText = data.status;

                // 2. Mesoscale Corridor Parsing
                const corridorText = data.meso_analysis;
                document.getElementById('meso-corridor').innerText = corridorText;

                // 3. Nested Target Elements Extraction
                const metrics = data.provider_packaged_data;
                document.getElementById('hail-prob').innerText = metrics.hail_probability + "%";

                // 4. No Hardcoding: Pull geographic arrays directly out of the tracking array
                if (metrics.radar_vortex_points && metrics.radar_vortex_points.length >= 2) {
                    const lat = metrics.radar_vortex_points[0];
                    const lon = metrics.radar_vortex_points[1];
                    document.getElementById('vortex-coords').innerText = `${lat}°N, ${Math.abs(lon)}°W`;
                } else {
                    document.getElementById('vortex-coords').innerText = "TRACKING OFF";
                }

                // Process the TWC graphical layout
                updateTWCIcon(corridorText);

            } catch (error) {
                console.warn("CORS/Fetch latency caught. Holding layout interface standard.", error);
                // Keep UI elegant and clean during push cycles instead of printing raw crashes
                document.getElementById('system-status').innerText = "SYS: LINK SYNCING";
                document.getElementById('meso-corridor').innerText = "Awaiting matrix push...";
            }
        }

        // Initialize and lock structural refresh rate loop
        fetchMatrixCache();
        setInterval(fetchMatrixCache, 5000);
    </script>
</body>
</html>
