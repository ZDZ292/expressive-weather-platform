<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SlateWeather Professional Workstation</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --app-bg: #060913;
            --glass-card: rgba(22, 30, 54, 0.65);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-sub: #94a9c9;
            --accent-glow: #2f80ed;
            --radar-fallback: #04060c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Ambient Dynamic Weather Canvas Fluid Background */
        .weather-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1a2d54 0%, #060913 75%);
            z-index: -1;
            transition: background 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Perfect Mobile Container Sandbox Constraint Box */
        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 100px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Reconfigured Luxury Search Deck Layout */
        .location-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 6px 16px;
            align-items: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: rgba(47, 128, 237, 0.4);
            box-shadow: 0 4px 30px rgba(47, 128, 237, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-bar input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 8px 4px;
            font-size: 1rem;
            font-weight: 500;
        }

        .search-bar input::placeholder { color: rgba(255, 255, 255, 0.35); }
        .search-bar i { color: var(--text-sub); cursor: pointer; padding: 6px; transition: color 0.2s; }
        .search-bar i:hover { color: white; }

        .active-city-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 14px;
            border-radius: 30px;
            align-self: flex-start;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            gap: 6px;
            color: #4dbfff;
            border: 1px solid rgba(77, 191, 255, 0.15);
        }

        /* Revamped Cinematic Core Hero Layout Viewport */
        .current-hero {
            text-align: center;
            padding: 10px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        .owm-hero-asset {
            width: 130px;
            height: 130px;
            object-fit: contain;
            filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.5));
            margin-bottom: -5px;
        }

        .current-hero .temp-display {
            font-size: 6rem;
            font-weight: 200;
            line-height: 1;
            position: relative;
            margin-left: 20px;
            letter-spacing: -2px;
        }
        .current-hero .temp-display::after {
            content: "°";
            position: absolute;
            top: 2px;
            right: -25px;
            font-weight: 300;
        }

        .current-hero .condition-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 8px;
            text-transform: capitalize;
            letter-spacing: -0.3px;
        }

        .current-hero .hi-lo {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 10px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* Glassmorphic Dashboard UI Panels */
        .weather-card {
            background: var(--glass-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-sub);
            margin-bottom: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 24-Hour Horizontal Scrubber Modules */
        .hourly-scrubber {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .hourly-scrubber::-webkit-scrollbar { display: none; }

        .hourly-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 62px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 8px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            gap: 4px;
        }
        .hourly-item .time { font-size: 0.75rem; color: var(--text-sub); font-weight: 600; }
        .hourly-item .owm-icon-asset { width: 44px; height: 44px; object-fit: contain; }
        .hourly-item .temp { font-size: 1rem; font-weight: 700; }

        /* 5-Day Matrix Rows */
        .daily-list { display: flex; flex-direction: column; gap: 10px; }
        .daily-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            border-radius: 14px;
            transition: background 0.2s ease;
        }
        .daily-row:hover { background: rgba(255, 255, 255, 0.02); }
        .daily-row .day-name { width: 100px; font-weight: 600; font-size: 0.95rem; }
        .daily-row .day-icon-group { display: flex; align-items: center; width: 50px; justify-content: center; }
        .daily-row .day-icon-group .owm-icon-asset { width: 44px; height: 44px; object-fit: contain; }
        .daily-row .day-temps { text-align: right; font-weight: 700; font-size: 0.95rem; width: 80px; }
        .daily-row .day-temps .low { color: var(--text-sub); font-weight: 500; margin-left: 8px; }

        /* Next-Gen Interactive RIDGE2 Map Canvas Viewports */
        .media-viewport {
            width: 100%;
            background: var(--radar-fallback);
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4 / 3;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .media-viewport iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--radar-fallback);
        }
        .media-viewport img { width: 100%; height: 100%; object-fit: contain; }

        /* Tab Execution Panels Configuration */
        .app-view-panel { display: none; flex-direction: column; gap: 20px; }
        .app-view-panel.active-view { display: flex; }

        /* Luxury Ground Dock Controls Footer */
        .bottom-nav-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 999;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
        }

        .nav-dock-item {
            background: transparent;
            border: none;
            color: var(--text-sub);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            width: 65px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-dock-item i { font-size: 1.3rem; transition: transform 0.2s; }
        .nav-dock-item:hover { color: white; }
        .nav-dock-item.active-tab { color: var(--accent-glow); }
        .nav-dock-item.active-tab i { transform: translateY(-2px); }

        .null-state-handler { text-align: center; padding: 30px 10px; color: var(--text-sub); font-size: 0.9rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="weather-canvas" id="canvas-layer"></div>

    <div class="app-container">
        
        <div class="location-header">
            <div class="search-bar">
                <input type="text" id="target-search-field" placeholder="Enter target layout (e.g. Cook County, Chicago)...">
                <i class="fa-solid fa-magnifying-glass" onclick="triggerGeocodePipeline()"></i>
            </div>
            <div class="active-city-pill" id="display-location-label">
                <i class="fa-solid fa-location-crosshairs"></i> Awaiting Data Ingest
            </div>
        </div>

        <div id="view-home" class="app-view-panel active-view">
            <div class="current-hero">
                <img id="hero-owm-icon" class="owm-hero-asset" src="" alt="Condition Graphic" style="display:none;">
                <div class="temp-display" id="hero-temp">--</div>
                <div class="condition-text" id="hero-condition">System Operational</div>
                <div class="hi-lo" id="hero-hilo">Input a location target to initialize OpenWeather API data modules.</div>
            </div>

            <div class="weather-card">
                <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> Hourly Track</div>
                <div class="hourly-scrubber" id="container-hourly-scrubber">
                    <div class="null-state-handler"><p>Data feeds currently offline.</p></div>
                </div>
            </div>

            <div class="weather-card">
                <div class="card-title"><i class="fa-solid fa-calendar-days"></i> Outlook Matrix</div>
                <div class="daily-list" id="container-daily-stack">
                    <div class="null-state-handler"><p>Data feeds currently offline.</p></div>
                </div>
            </div>
        </div>

        <div id="view-radar" class="app-view-panel">
            <div class="weather-card">
                <div class="card-title" id="radar-title-id"><i class="fa-solid fa-satellite-dish"></i> RIDGE2 Live Interactive Doppler</div>
                <div class="media-viewport">
                    <iframe id="radar-frame-engine" src="https://radar.weather.gov/index.html#/" allow="geolocation"></iframe>
                </div>
            </div>
        </div>

        <div id="view-storms" class="app-view-panel">
            <div class="weather-card">
                <div class="card-title"><i class="fa-solid fa-triangle-exclamation"></i> SPC Day 1 Convective Map</div>
                <div class="media-viewport">
                    <img id="spc-day1" src="https://www.spc.noaa.gov/products/outlook/day1otlk.gif" alt="SPC Day 1 Outlook" onerror="this.src='https://www.spc.noaa.gov/products/outlook/day1otlk_otlk.gif'">
                </div>
            </div>
            <div class="weather-card">
                <div class="card-title"><i class="fa-solid fa-shield-halved"></i> SPC Day 2 Convective Map</div>
                <div class="media-viewport">
                    <img id="spc-day2" src="https://www.spc.noaa.gov/products/outlook/day2otlk.gif" alt="SPC Day 2 Outlook" onerror="this.src='https://www.spc.noaa.gov/products/outlook/day2otlk_otlk.gif'">
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav-dock">
        <button class="nav-dock-item active-tab" onclick="switchAppViewFrame('view-home', this)">
            <i class="fa-solid fa-cubes"></i>Home
        </button>
        <button class="nav-dock-item" onclick="switchAppViewFrame('view-storms', this)">
            <i class="fa-solid fa-bolt-lightning"></i>Storms
        </button>
        <button class="nav-dock-item" onclick="switchAppViewFrame('view-radar', this)">
            <i class="fa-solid fa-radar"></i>Radar
        </button>
    </div>

    <script>
        /**
         * SECURE CLIENT INFRASTRUCTURE
         * Hardcoded fallback injection parameter maps to prevent GitHub context exposures.
         * Optional: Append keys to deployment query paths during localized sandbox verification:
         * e.g., index.html?OPEN=your_key
         */
        const searchConfigParams = new URLSearchParams(window.location.search);
        const SECURE_OPEN_KEY = searchConfigParams.get('OPEN') || "ebba6df21a50b73c4f98a274e1e072b2"; 
        
        let globalLat = null;
        let globalLon = null;

        // Visual Fluid Canvas Canvas Gradient Generator mapped to official OpenWeather item descriptors
        function computeFluidVisualCanvas(iconCode) {
            if (!iconCode) return "radial-gradient(circle at 50% 0%, #1a2d54 0%, #060913 75%)";
            if (iconCode.includes("11")) return "radial-gradient(circle at 50% 0%, #1c1d32 0%, #05070d 80%)"; // Severe Thunderstorm
            if (iconCode.includes("09") || iconCode.includes("10")) return "radial-gradient(circle at 50% 0%, #18283d 0%, #060912 80%)"; // Precipitation Layers
            if (iconCode.includes("13")) return "radial-gradient(circle at 50% 0%, #364459 0%, #060913 80%)"; // Frozen snow matrices
            if (iconCode.includes("50")) return "radial-gradient(circle at 50% 0%, #293442 0%, #060913 80%)"; // Microscopic fog/mist lines
            if (iconCode.includes("01")) {
                return iconCode.includes("d") ? "radial-gradient(circle at 50% 0%, #2a6ec7 0%, #060913 85%)" : "radial-gradient(circle at 50% 0%, #0e1424 0%, #03050a 85%)";
            }
            return "radial-gradient(circle at 50% 0%, #1f2f4c 0%, #060913 80%)"; // standard overcast layers
        }

        function switchAppViewFrame(targetId, buttonElement) {
            document.querySelectorAll('.app-view-panel').forEach(view => view.classList.remove('active-view'));
            document.querySelectorAll('.nav-dock-item').forEach(item => item.classList.remove('active-tab'));
            
            document.getElementById(targetId).classList.add('active-view');
            buttonElement.classList.add('active-tab');

            if (targetId === 'view-storms') {
                const cacheBustKey = new Date().getTime();
                document.getElementById('spc-day1').src = `https://www.spc.noaa.gov/products/outlook/day1otlk.gif?cache=${cacheBustKey}`;
                document.getElementById('spc-day2').src = `https://www.spc.noaa.gov/products/outlook/day2otlk.gif?cache=${cacheBustKey}`;
            }
        }

        async function triggerGeocodePipeline() {
            const inputVal = document.getElementById('target-search-field').value.trim();
            if (!inputVal) return;

            try {
                const res = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(inputVal)}&limit=1&appid=${SECURE_OPEN_KEY}`);
                const data = await res.json();

                if (!data || data.length === 0) {
                    alert("Target deployment array was unable to map the provided coordinate bounds.");
                    return;
                }

                const location = data[0];
                globalLat = parseFloat(location.lat).toFixed(4);
                globalLon = parseFloat(location.lon).toFixed(4);

                document.getElementById('display-location-label').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${location.name}, ${location.state || location.country}`;
                document.getElementById('target-search-field').value = "";

                executeUnifiedForecastPipeline();
            } catch (err) {
                console.error("Critical core geocode error: ", err);
            }
        }

        async function executeUnifiedForecastPipeline() {
            if (!globalLat || !globalLon) return;

            try {
                // Precision placement injection map parameter configuration updates
                document.getElementById('radar-frame-engine').src = `https://radar.weather.gov/index.html#/?zoom=8&center=${globalLat},${globalLon}`;

                const weatherRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${globalLat}&lon=${globalLon}&units=imperial&appid=${SECURE_OPEN_KEY}`);
                const weatherData = await weatherRes.json();

                const forecastRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${globalLat}&lon=${globalLon}&units=imperial&appid=${SECURE_OPEN_KEY}`);
                const forecastData = await forecastRes.json();

                renderAppHeroForecast(weatherData);
                renderAppHourlyScrubber(forecastData.list);
                renderAppDailyStack(forecastData.list);

            } catch (err) {
                console.error("Core engine feed stream error sequence out: ", err);
            }
        }

        function renderAppHeroForecast(data) {
            const currentCondition = data.weather[0];
            
            document.getElementById('hero-temp').innerText = Math.round(data.main.temp);
            document.getElementById('hero-condition').innerText = currentCondition.description;
            document.getElementById('hero-hilo').innerText = `Feels Like: ${Math.round(data.main.feels_like)}°  •  Humidity: ${data.main.humidity}%  •  Wind: ${Math.round(data.wind.speed)} MPH`;
            
            const heroIconElement = document.getElementById('hero-owm-icon');
            // High Resolution Official 4x OpenWeather Content Grid Engine Images
            heroIconElement.src = `https://openweathermap.org/img/wn/${currentCondition.icon}@4x.png`;
            heroIconElement.style.display = "block";
            
            document.getElementById('canvas-layer').style.background = computeFluidVisualCanvas(currentCondition.icon);
        }

        function renderAppHourlyScrubber(list) {
            const container = document.getElementById('container-hourly-scrubber');
            container.innerHTML = "";

            const displayLimit = Math.min(list.length, 8); // Clean 24-hour horizontal trace tracking block
            for (let i = 0; i < displayLimit; i++) {
                const p = list[i];
                const timeStr = new Date(p.dt * 1000).toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
                const condition = p.weather[0];

                const hourBlock = document.createElement('div');
                hourBlock.className = 'hourly-item';
                hourBlock.innerHTML = `
                    <span class="time">${timeStr}</span>
                    <img class="owm-icon-asset" src="https://openweathermap.org/img/wn/${condition.icon}@2x.png" alt="icon">
                    <span class="temp">${Math.round(p.main.temp)}°</span>
                `;
                container.appendChild(hourBlock);
            }
        }

        function renderAppDailyStack(list) {
            const container = document.getElementById('container-daily-stack');
            container.innerHTML = "";

            const dailyMap = {};
            list.forEach(item => {
                const dateStr = new Date(item.dt * 1000).toLocaleDateString('en-US', { weekday: 'long' });
                if (!dailyMap[dateStr]) {
                    dailyMap[dateStr] = {
                        day: dateStr,
                        temp_max: item.main.temp_max,
                        temp_min: item.main.temp_min,
                        icon: item.weather[0].icon
                    };
                } else {
                    if (item.main.temp_max > dailyMap[dateStr].temp_max) dailyMap[dateStr].temp_max = item.main.temp_max;
                    if (item.main.temp_min < dailyMap[dateStr].temp_min) dailyMap[dateStr].temp_min = item.main.temp_min;
                }
            });

            Object.values(dailyMap).forEach(g => {
                const row = document.createElement('div');
                row.className = 'daily-row';

                row.innerHTML = `
                    <div class="day-name">${g.day}</div>
                    <div class="day-icon-group">
                        <img class="owm-icon-asset" src="https://openweathermap.org/img/wn/${g.icon}@2x.png" alt="icon">
                    </div>
                    <div class="day-temps">
                        <span>${Math.round(g.temp_max)}°</span><span class="low">${Math.round(g.temp_min)}°</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }
    </script>
</body>
</html>
