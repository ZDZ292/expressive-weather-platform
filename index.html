<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlateWeather PRO - Onyx Tactical HUD</title>
    <style>
        /* Modern Onyx Black Desert Design System */
        :root {
            --bg-base: #0a0a0c;
            --bg-panel: #121216;
            --border-glow: #24242b;
            --text-primary: #f4f4f6;
            --accent-orange: #ff6b35; /* Desert Fire */
            --accent-gold: #ffb703;   /* Amber Warning */
            --text-muted: #6c6c7d;
            --alert-red: #ff3333;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 24px;
            letter-spacing: 0.5px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .brand-zone h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        .brand-zone h1 span {
            color: var(--accent-orange);
        }

        .station-ticker {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
        }

        .status-badge {
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: bold;
            background: #181820;
            border: 1px solid var(--border-glow);
            padding: 6px 12px;
            border-radius: 4px;
            color: var(--accent-gold);
            letter-spacing: 1px;
        }

        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
        }

        .panel-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .panel-header {
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .hero-status {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .twc-hud-icon {
            width: 64px;
            height: 64px;
            background: #181820;
            border-radius: 6px;
            border: 1px solid var(--border-glow);
            padding: 4px;
        }

        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-node {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #181820;
            font-size: 0.95rem;
        }

        .node-label {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 0.85rem;
        }

        .node-value {
            font-weight: 600;
            color: var(--accent-gold);
        }

        .node-value.highlight {
            color: var(--accent-orange);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-zone">
            <h1>SLATEWEATHER <span>PRO</span></h1>
            <div class="station-ticker" id="dyn-corridor-label">SYSTEM INITIALIZING...</div>
        </div>
        <div class="status-badge" id="dyn-badge">SYS: CC_LOAD</div>
    </header>

    <main class="grid-matrix">
        <section class="panel-card">
            <div class="panel-header">
                <span>METRIC TARGETING</span>
                <span style="color: var(--accent-orange);">● LIVE</span>
            </div>
            
            <div class="metric-hero">
                <div class="hero-status" id="hud-status">--</div>
                <img id="twc-hud-icon" class="twc-hud-icon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="HUD Icon">
            </div>
            
            <div class="data-grid">
                <div class="data-node">
                    <span class="node-label">HAIL METRIC</span>
                    <span class="node-value highlight" id="hud-hail">--%</span>
                </div>
            </div>
        </section>

        <section class="panel-card">
            <div class="panel-header">RADAR VORTEX KINEMATICS</div>
            
            <div class="data-grid" style="margin-top: 10px;">
                <div class="data-node">
                    <span class="node-label">TARGET LATITUDE</span>
                    <span class="node-value" id="hud-lat">--</span>
                </div>
                <div class="data-node">
                    <span class="node-label">TARGET LONGITUDE</span>
                    <span class="node-value" id="hud-lon">--</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Production Weather Channel API image reference asset codes
        function getTWCCode(analysisStr) {
            const text = analysisStr.toLowerCase();
            if (text.includes("tornado") || text.includes("vortex")) return "00";
            if (text.includes("severe") || text.includes("hail")) return "03";
            if (text.includes("convective") || text.includes("storm") || text.includes("thunder")) return "04";
            if (text.includes("rain") || text.includes("shower")) return "12";
            if (text.includes("cloudy")) return "26";
            return "44"; 
        }

        function updateHUDIcon(analysisStr) {
            const iconCode = getTWCCode(analysisStr);
            document.getElementById('twc-hud-icon').src = `https://www.weather.com/wximage/wxdigitalicons/${iconCode}.png`;
        }

        async function pullPipelineCache() {
            try {
                // Queries your exact python payload cache file path
                const response = await fetch('live_weather_cache.json');
                if (!response.ok) throw new Error(`HTTP network error: ${response.status}`);
                
                const data = await response.json();

                // 1. Dynamic Infrastructure Header Text Mapping
                document.getElementById('dyn-badge').innerText = `SYS: ${data.status}`;
                document.getElementById('hud-status').innerText = data.status;
                
                // NO HARDCODING: Directly binds your python string text directly into the layout label
                document.getElementById('dyn-corridor-label').innerText = `REGION CORE // ${data.meso_analysis}`;

                // 2. Extract nested metrics payload safely
                const metrics = data.provider_packaged_data;
                document.getElementById('hud-hail').innerText = (metrics.hail_probability || 0) + "%";

                // 3. Process geographical location coordinates list metrics
                if (metrics.radar_vortex_points && metrics.radar_vortex_points.length >= 2) {
                    document.getElementById('hud-lat').innerText = metrics.radar_vortex_points[0].toFixed(4) + "° N";
                    document.getElementById('hud-lon').innerText = metrics.radar_vortex_points[1].toFixed(4) + "° W";
                } else {
                    document.getElementById('hud-lat').innerText = "CLEAR";
                    document.getElementById('hud-lon').innerText = "CLEAR";
                }

                updateHUDIcon(data.meso_analysis);

            } catch (error) {
                console.error("Pipeline failure:", error);
                document.getElementById('dyn-badge').innerText = "SYS: OFFLINE";
                document.getElementById('hud-status').innerText = "ERR";
                document.getElementById('dyn-corridor-label').innerText = "PIPELINE RECOVERY LINK OFFLINE";
            }
        }

        // Run dashboard tracking engine loop
        pullPipelineCache();
        setInterval(pullPipelineCache, 3000); // Super responsive 3-second cycle
    </script>
</body>
</html>
