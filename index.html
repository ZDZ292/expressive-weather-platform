<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expressive Weather Platform</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --app-bg: #101524;
            --surface-blur: rgba(20, 28, 48, 0.75);
            --surface-card: #1c253c;
            --text-main: #ffffff;
            --text-sub: #9aa8c2;
            --accent-blue: #2f80ed;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Dynamic Visual Weather Canvas Background Layer */
        .weather-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #1b3358 0%, #101524 100%);
            z-index: -1;
            transition: background 1s ease;
        }

        /* Responsive Mobile Sandbox Blueprint Frame */
        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 16px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Location Bar Controls */
        .location-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .search-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 4px 14px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-bar input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 8px;
            font-size: 0.95rem;
        }

        .search-bar input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .search-bar i { color: white; cursor: pointer; }

        .active-city-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            align-self: flex-start;
            font-weight: 600;
            font-size: 0.9rem;
            gap: 6px;
        }

        /* Hero Condition Frame styling */
        .current-hero {
            text-align: center;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .current-hero .twc-large-icon {
            width: 110px;
            height: 110px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.25));
        }

        .current-hero .temp-display {
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1;
            position: relative;
            margin-left: 15px;
            margin-top: 6px;
        }
        .current-hero .temp-display::after {
            content: "°";
            position: absolute;
            top: 5px;
            right: -25px;
        }

        .current-hero .condition-text {
            font-size: 1.25rem;
            font-weight: 500;
            margin-top: 6px;
        }

        .current-hero .hi-lo {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 6px;
            font-weight: 500;
        }

        /* Container Card Geometry */
        .weather-card {
            background: var(--surface-card);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .card-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 14px;
            font-weight: 700;
        }

        /* Hourly Horizontal Scrubber Structure */
        .hourly-scrubber {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .hourly-scrubber::-webkit-scrollbar { display: none; }

        .hourly-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 55px;
            gap: 6px;
        }
        .hourly-item .time { font-size: 0.8rem; color: var(--text-sub); font-weight: 500; }
        .hourly-item .twc-scrub-icon { width: 36px; height: 36px; object-fit: contain; }
        .hourly-item .pop { font-size: 0.7rem; color: #56ccf2; font-weight: 700; height: 14px; }
        .hourly-item .temp { font-size: 1rem; font-weight: 600; }

        /* Daily Row Lists */
        .daily-list { display: flex; flex-direction: column; gap: 12px; }
        .daily-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .daily-row:last-child { border-bottom: none; padding-bottom: 0; }
        .daily-row .day-name { width: 85px; font-weight: 600; font-size: 0.95rem; }
        .daily-row .day-icon-group { display: flex; align-items: center; width: 60px; justify-content: center; }
        .daily-row .twc-list-icon { width: 36px; height: 36px; object-fit: contain; }
        .daily-row .day-pop { font-size: 0.75rem; color: #56ccf2; font-weight: 700; width: 35px; text-align: left; }
        .daily-row .day-temps { text-align: right; font-weight: 600; font-size: 0.95rem; width: 70px; }
        .daily-row .day-temps .low { color: var(--text-sub); font-weight: 400; margin-left: 6px; }

        /* Image Viewports */
        .media-viewport {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4 / 3;
        }
        .media-viewport img { width: 100%; height: 100%; object-fit: cover; }

        /* Structural Tab Engine Navigation */
        .app-view-panel { display: none; flex-direction: column; gap: 16px; }
        .app-view-panel.active-view { display: flex; }

        .bottom-nav-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            background: #0f1422;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 999;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
        }

        .nav-dock-item {
            background: transparent;
            border: none;
            color: var(--text-sub);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            width: 60px;
            transition: color 0.2s;
        }
        .nav-dock-item i { font-size: 1.25rem; }
        .nav-dock-item.active-tab { color: var(--accent-blue); }

        .null-state-handler { text-align: center; padding: 40px 20px; color: var(--text-sub); width: 100%; }
    </style>
</head>
<body>

    <div class="weather-canvas" id="canvas-layer"></div>

    <div class="app-container">
        
        <div class="location-header">
            <div class="search-bar">
                <input type="text" id="target-search-field" placeholder="Search for city, county, or zip code...">
                <i class="fa-solid fa-magnifying-glass" onclick="triggerGeocodePipeline()"></i>
            </div>
            <div class="active-city-pill" id="display-location-label">
                <i class="fa-solid fa-location-crosshairs"></i> Awaiting Target Loc Lock
            </div>
        </div>

        <div id="view-home" class="app-view-panel active-view">
            <div class="current-hero">
                <img id="hero-twc-icon" src="https://www.weather.com/wp-content/themes/twc/assets/images/clear.svg" style="display:none;" class="twc-large-icon" alt="Current Weather Condition">
                <div class="temp-display" id="hero-temp">--</div>
                <div class="condition-text" id="hero-condition">Ready To Target Grid</div>
                <div class="hi-lo" id="hero-hilo">Lock location above for processing</div>
            </div>

            <div class="weather-card">
                <div class="card-title">Hourly Forecast</div>
                <div class="hourly-scrubber" id="container-hourly-scrubber">
                    <div class="null-state-handler"><p>No live data stream loaded.</p></div>
                </div>
            </div>

            <div class="weather-card">
                <div class="card-title">Daily Forecast</div>
                <div class="daily-list" id="container-daily-stack">
                    <div class="null-state-handler"><p>No live data stream loaded.</p></div>
                </div>
            </div>
        </div>

        <div id="view-radar" class="app-view-panel">
            <div class="weather-card">
                <div class="card-title" id="radar-title-id">NEXRAD Doppler Feed</div>
                <div class="media-viewport">
                    <img id="radar-image-stream" src="https://radar.weather.gov/ridge/standard/CONUS_LOOP.gif" alt="Radar Feed Grid">
                </div>
            </div>
        </div>

        <div id="view-storms" class="app-view-panel">
            <div class="weather-card">
                <div class="card-title">SPC Day 1 Convective Outlook</div>
                <div class="media-viewport">
                    <img src="https://www.spc.noaa.gov/products/outlook/day1otlk.gif" alt="Day 1 Outlook Layer">
                </div>
            </div>
            <div class="weather-card">
                <div class="card-title">SPC Day 2 Convective Outlook</div>
                <div class="media-viewport">
                    <img src="https://www.spc.noaa.gov/products/outlook/day2otlk.gif" alt="Day 2 Outlook Layer">
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav-dock">
        <button class="nav-dock-item active-tab" onclick="switchAppViewFrame('view-home', this)">
            <i class="fa-solid fa-house-chimney"></i>Home
        </button>
        <button class="nav-dock-item" onclick="switchAppViewFrame('view-storms', this)">
            <i class="fa-solid fa-cloud-bolt"></i>Storms
        </button>
        <button class="nav-dock-item" onclick="switchAppViewFrame('view-radar', this)">
            <i class="fa-solid fa-compass-drafting"></i>Radar
        </button>
    </div>

    <script>
        let globalLat = null;
        let globalLon = null;

        // Maps weather.gov raw data to the exact developer.weather.com (TWC) icon nomenclature index
        function extractWeatherChannelIconCode(nwsShortForecast, nwsIconUrl) {
            const text = nwsShortForecast.toLowerCase();
            const rawIcon = nwsIconUrl ? nwsIconUrl.toLowerCase() : "";
            const isNight = rawIcon.includes("/night/") || rawIcon.includes(",night");

            // Extreme / Severe Convective Elements
            if (text.includes("tornado")) return "00";
            if (text.includes("hurricane") || text.includes("tropical storm")) return "02";
            if (text.includes("thunderstorm") || text.includes("severe") || text.includes("tstorm")) {
                return "04"; 
            }
            
            // Winter Matrix Channels
            if (text.includes("freezing rain") || text.includes("sleet") || text.includes("wintry mix")) return "07";
            if (text.includes("snow showers")) return "14";
            if (text.includes("snow") || text.includes("flurries")) return "16";
            
            // Precipitation Streams
            if (text.includes("heavy rain") || text.includes("downpour")) return "12";
            if (text.includes("showers") || text.includes("rain")) return "11";
            if (text.includes("drizzle")) return "09";
            
            // Atmospheric Occlusions
            if (text.includes("fog")) return "20";
            if (text.includes("haze")) return "21";
            if (text.includes("smoke")) return "22";
            if (text.includes("windy") || text.includes("breezy")) return "24";
            
            // Clouds & Radiation Core Splits
            if (text.includes("mostly cloudy") || text.includes("overcast")) return isNight ? "27" : "28";
            if (text.includes("partly cloudy") || text.includes("scattered")) return isNight ? "29" : "30";
            
            // Clear / Sunny Baselines
            return isNight ? "31" : "32";
        }

        // Returns background gradient stylings matching specific atmospheric states
        function computeCanvasBgGradient(iconCode) {
            const code = parseInt(iconCode, 10);
            if ([0, 1, 2, 3, 4].includes(code)) return "linear-gradient(180deg, #202636 0%, #0c0f17 100%)"; // Thunderstorm/Tornado
            if ([5, 6, 7, 8, 9, 10, 11, 12].includes(code)) return "linear-gradient(180deg, #384860 0%, #1c2430 100%)"; // Rain
            if ([13, 14, 15, 16, 17, 18].includes(code)) return "linear-gradient(180deg, #4b596d 0%, #29323d 100%)"; // Snow
            if ([26, 27, 28, 29, 30].includes(code)) return "linear-gradient(180deg, #446fa3 0%, #192c44 100%)"; // Cloudy
            if (code === 31 || code === 33) return "linear-gradient(180deg, #101626 0%, #070a12 100%)"; // Night Clear
            return "linear-gradient(180deg, #3a7bd5 0%, #20497a 100%)"; // Day Clear
        }

        function switchAppViewFrame(targetId, buttonElement) {
            document.querySelectorAll('.app-view-panel').forEach(view => view.classList.remove('active-view'));
            document.querySelectorAll('.nav-dock-item').forEach(item => item.classList.remove('active-tab'));
            
            document.getElementById(targetId).classList.add('active-view');
            buttonElement.classList.add('active-tab');
        }

        async function triggerGeocodePipeline() {
            const inputVal = document.getElementById('target-search-field').value.trim();
            if (!inputVal) return;

            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(inputVal)}&count=1&language=en&format=json`);
                const data = await res.json();

                if (!data.results || data.results.length === 0) {
                    alert("Location context not found.");
                    return;
                }

                const location = data.results[0];
                globalLat = parseFloat(location.latitude).toFixed(2);
                globalLon = parseFloat(location.longitude).toFixed(2);

                document.getElementById('display-location-label').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${location.name}, ${location.admin1 || ''}`;
                document.getElementById('target-search-field').value = "";

                executeUnifiedForecastPipeline();
            } catch (err) {
                console.error("Geocoding step error: ", err);
            }
        }

        async function executeUnifiedForecastPipeline() {
            if (!globalLat || !globalLon) return;

            try {
                const pointsResponse = await fetch(`https://api.weather.gov/points/${globalLat},${globalLon}`);
                const pointsData = await pointsResponse.json();

                // Dynamic NEXRAD parsing
                const radarStation = pointsData.properties.radarStation.toUpperCase();
                document.getElementById('radar-title-id').innerText = `${radarStation} NEXRAD Base Reflectivity`;
                document.getElementById('radar-image-stream').src = `https://radar.weather.gov/ridge/standard/${radarStation}_LOOP.gif`;

                const dailyEndpoint = pointsData.properties.forecast;
                const hourlyEndpoint = pointsData.properties.forecastHourly;

                const [dailyRes, hourlyRes] = await Promise.all([
                    fetch(dailyEndpoint).then(r => r.json()),
                    fetch(hourlyEndpoint).then(r => r.json())
                ]);

                renderAppHeroForecast(dailyRes.properties.periods[0]);
                renderAppHourlyScrubber(hourlyRes.properties.periods);
                renderAppDailyStack(dailyRes.properties.periods);

            } catch (err) {
                console.error("Critical execution drop processing NWS pipeline: ", err);
            }
        }

        function renderAppHeroForecast(currentPeriod) {
            document.getElementById('hero-temp').innerText = currentPeriod.temperature;
            document.getElementById('hero-condition').innerText = currentPeriod.shortForecast;
            document.getElementById('hero-hilo').innerText = currentPeriod.detailedForecast;
            
            const iconCode = extractWeatherChannelIconCode(currentPeriod.shortForecast, currentPeriod.icon);
            const heroIconElement = document.getElementById('hero-twc-icon');
            
            // Point directly to the official high-res Weather Channel asset catalog links
            heroIconElement.src = `https://v.fastcdn.co/u/f91a6dd1/52438591-0-${iconCode}.png`;
            heroIconElement.style.display = "block";
            
            document.getElementById('canvas-layer').style.background = computeCanvasBgGradient(iconCode);
        }

        function renderAppHourlyScrubber(periods) {
            const container = document.getElementById('container-hourly-scrubber');
            container.innerHTML = "";

            for (let i = 0; i < 24; i++) {
                const p = periods[i];
                const timeStr = new Date(p.startTime).toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
                const iconCode = extractWeatherChannelIconCode(p.shortForecast, p.icon);
                const popValue = p.probabilityOfPrecipitation?.value || 0;

                const hourBlock = document.createElement('div');
                hourBlock.className = 'hourly-item';
                hourBlock.innerHTML = `
                    <span class="time">${timeStr}</span>
                    <img class="twc-scrub-icon" src="https://v.fastcdn.co/u/f91a6dd1/52438591-0-${iconCode}.png" alt="icon">
                    <span class="pop">${popValue > 0 ? popValue + '%' : ''}</span>
                    <span class="temp">${p.temperature}°</span>
                `;
                container.appendChild(hourBlock);
            }
        }

        function renderAppDailyStack(periods) {
            const container = document.getElementById('container-daily-stack');
            container.innerHTML = "";

            const dailyGroups = [];
            periods.forEach(p => {
                if (p.isDaytime) {
                    dailyGroups.push({
                        day: p.name,
                        iconText: p.shortForecast,
                        iconUrl: p.icon,
                        high: p.temperature,
                        pop: p.probabilityOfPrecipitation?.value || 0,
                        low: '--'
                    });
                } else if (dailyGroups.length > 0) {
                    dailyGroups[dailyGroups.length - 1].low = p.temperature;
                }
            });

            dailyGroups.forEach(g => {
                const row = document.createElement('div');
                row.className = 'daily-row';
                const iconCode = extractWeatherChannelIconCode(g.iconText, g.iconUrl);

                row.innerHTML = `
                    <div class="day-name">${g.day}</div>
                    <div class="day-icon-group">
                        <img class="twc-list-icon" src="https://v.fastcdn.co/u/f91a6dd1/52438591-0-${iconCode}.png" alt="icon">
                    </div>
                    <div class="day-pop">${g.pop > 5 ? g.pop + '%' : ''}</div>
                    <div class="day-temps">
                        <span>${g.high}°</span><span class="low">${g.low}°</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }
    </script>
</body>
</html>
