<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlateWeather PRO - Synoptic Dashboard</title>
    <style>
        /* Retro-Technical Overlay Styles with Unsplash Backdrop */
        :root {
            --bg-overlay: rgba(0, 0, 128, 0.75); /* Translucent 80s TWC Blue */
            --text-primary: #ffffff;
            --text-accent: #ffff00; /* Weather Channel Yellow */
            --text-alert: #ff2a2a;
            --panel-bg: rgba(0, 0, 192, 0.85);
            --border-color: #00a8a8;
        }

        body {
            /* Exact Unsplash Lightning Bolt Backdrop Asset Placement */
            background-image: url('https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin: 0;
            padding: 20px;
            text-transform: uppercase;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Ambient scanline filter over background to scream 1980s tube monitor */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            opacity: 0.4;
            pointer-events: none;
            background-size: 100% 4px, 6px 100%;
        }

        header {
            background-color: var(--bg-overlay);
            border: 4px double var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            box-shadow: 5px 5px 0px #000;
        }

        h1 {
            color: var(--text-accent);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .source-tag {
            font-size: 1rem;
            background: var(--border-color);
            color: #000;
            padding: 4px 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 3px solid var(--border-color);
            box-shadow: 5px 5px 0px #000;
            padding: 20px;
            backdrop-filter: blur(4px); /* Blend the panels smoothly against the background */
        }

        .panel-title {
            color: var(--text-accent);
            border-bottom: 2px solid var(--border-color);
            margin-top: 0;
            padding-bottom: 5px;
            font-size: 1.3rem;
        }

        /* TWC Icon Container Structure */
        .weather-identity {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
        }

        .large-temp {
            font-size: 4.5rem;
            color: #fff;
            margin: 0;
        }

        .twc-icon {
            width: 96px;
            height: 96px;
            image-rendering: pixelated; /* Keeps that retro crunch on the graphics */
            background-color: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 1.2rem;
            border-bottom: 1px dotted rgba(255,255,255,0.2);
            padding-bottom: 4px;
        }

        .data-value {
            color: var(--text-accent);
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>SYNOPTIC WEATHER DATA</h1>
            <div id="station-info">STATION: EVANSTON, IL // HQ WORKSTATION</div>
        </div>
        <div class="source-tag" id="api-source">SRC: INITIALIZING...</div>
    </header>

    <main class="grid-container">
        <section class="panel">
            <h2 class="panel-title">CURRENT CONDITIONS</h2>
            
            <div class="weather-identity">
                <div class="large-temp"><span id="current-temp">--</span>°F</div>
                <img id="twc-condition-icon" class="twc-icon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Icon">
            </div>
            
            <div class="data-row">
                <span>CONDITION:</span>
                <span class="data-value" id="weather-summary">LOADING...</span>
            </div>
            <div class="data-row">
                <span>DEW POINT:</span>
                <span class="data-value" id="dew-point">--°F</span>
            </div>
            <div class="data-row">
                <span>HUMIDITY:</span>
                <span class="data-value" id="humidity">--%</span>
            </div>
        </section>

        <section class="panel">
            <h2 class="panel-title">ATMOSPHERIC DYNAMICS</h2>
            <div class="data-row">
                <span>WIND SPEED:</span>
                <span class="data-value" id="wind-speed">-- MPH</span>
            </div>
            <div class="data-row">
                <span>WIND DIR:</span>
                <span class="data-value" id="wind-dir">--°</span>
            </div>
            <div class="data-row">
                <span>BAROMETER:</span>
                <span class="data-value" id="pressure">-- MB</span>
            </div>
        </section>
    </main>

    <script>
        // TWC Code Translator Function mapping incoming strings to standard icon codes
        function getTWCCode(conditionStr, isNight = false) {
            const cleanText = conditionStr.toLowerCase();
            
            if (cleanText.includes("tornado")) return "00";
            if (cleanText.includes("tropical storm")) return "01";
            if (cleanText.includes("hurricane")) return "02";
            if (cleanText.includes("severe") || cleanText.includes("hail")) return "03";
            if (cleanText.includes("thunderstorm") || cleanText.includes("thunder") || cleanText.includes("storm")) return "04";
            if (cleanText.includes("freezing rain")) return "10";
            if (cleanText.includes("showers")) return "11";
            if (cleanText.includes("rain")) return "12";
            if (cleanText.includes("snow")) return "16";
            if (cleanText.includes("fog")) return "20";
            if (cleanText.includes("haze")) return "21";
            if (cleanText.includes("smokey") || cleanText.includes("smoke")) return "22";
            if (cleanText.includes("windy") || cleanText.includes("breezy")) return "24";
            if (cleanText.includes("cloudy") && !cleanText.includes("partly") && !cleanText.includes("mostly")) return "26";
            if (cleanText.includes("mostly cloudy")) return isNight ? "27" : "28";
            if (cleanText.includes("partly cloudy") || cleanText.includes("scattered clouds")) return isNight ? "29" : "30";
            if (cleanText.includes("clear") || cleanText.includes("sunny") || cleanText.includes("fair")) return isNight ? "31" : "32";
            
            return "44"; // N/A or Missing Code baseline
        }

        // TWC Asset URL compiler mapping directly into developer.weather.com format guidelines
        function updateTWCIcon(conditionText) {
            const currentHour = new Date().getHours();
            const isNightMode = (currentHour < 6 || currentHour > 20);
            const iconCode = getTWCCode(conditionText, isNightMode);
            
            // Build absolute path utilizing weather.com standard asset formatting
            const assetUrl = `https://www.weather.com/wximage/wxdigitalicons/${iconCode}.png`;
            document.getElementById('twc-condition-icon').src = assetUrl;
        }

        async function updateDashboard() {
            try {
                const response = await fetch('weather_output.json');
                const data = await response.json();
                let summaryText = "";

                if (data.source === "PIRATE") {
                    document.getElementById('api-source').innerText = "SRC: PIRATE ENG";
                    
                    document.getElementById('current-temp').innerText = Math.round(data.currently.temperature);
                    summaryText = data.currently.summary;
                    document.getElementById('weather-summary').innerText = summaryText;
                    document.getElementById('dew-point').innerText = Math.round(data.currently.dewPoint) + "°F";
                    document.getElementById('humidity').innerText = Math.round(data.currently.humidity * 100) + "%";
                    document.getElementById('wind-speed').innerText = Math.round(data.currently.windSpeed) + " MPH";
                    document.getElementById('wind-dir').innerText = data.currently.windBearing + "°";
                    document.getElementById('pressure').innerText = data.currently.pressure.toFixed(1) + " MB";

                } else if (data.source === "OPEN") {
                    document.getElementById('api-source').innerText = "SRC: OPEN MAP";
                    
                    document.getElementById('current-temp').innerText = Math.round(data.current.temp);
                    summaryText = data.current.weather[0].description;
                    document.getElementById('weather-summary').innerText = summaryText;
                    document.getElementById('dew-point').innerText = Math.round(data.current.dew_point) + "°F";
                    document.getElementById('humidity').innerText = data.current.humidity + "%";
                    document.getElementById('wind-speed').innerText = Math.round(data.current.wind_speed) + " MPH";
                    document.getElementById('wind-dir').innerText = data.current.wind_deg + "°";
                    document.getElementById('pressure').innerText = data.current.pressure + " MB";
                }

                // Execute icon asset compilation loop
                updateTWCIcon(summaryText);

            } catch (error) {
                console.error("Error updating synoptic loop:", error);
                document.getElementById('weather-summary').innerText = "OFFLINE / FETCH ERR";
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
