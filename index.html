<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlateWeather PRO - Synoptic Dashboard</title>
    <style>
        /* Retro-Technical Overlay Styles with Unsplash Backdrop */
        :root {
            --bg-overlay: rgba(0, 0, 128, 0.75); /* Translucent 80s TWC Blue */
            --text-primary: #ffffff;
            --text-accent: #ffff00; /* Weather Channel Yellow */
            --text-alert: #ff2a2a;
            --panel-bg: rgba(0, 0, 192, 0.85);
            --border-color: #00a8a8;
        }

        body {
            /* Exact Unsplash Lightning Bolt Backdrop Asset */
            background-image: url('https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin: 0;
            padding: 20px;
            text-transform: uppercase;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Scanline ambient overlay filter to mimic a classic 1980s CRT tube monitor */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            z-index: 9999;
            opacity: 0.4;
            pointer-events: none;
            background-size: 100% 4px, 6px 100%;
        }

        header {
            background-color: var(--bg-overlay);
            border: 4px double var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            box-shadow: 5px 5px 0px #000;
        }

        h1 {
            color: var(--text-accent);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .source-tag {
            font-size: 1rem;
            background: var(--border-color);
            color: #000;
            padding: 4px 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 3px solid var(--border-color);
            box-shadow: 5px 5px 0px #000;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .panel-title {
            color: var(--text-accent);
            border-bottom: 2px solid var(--border-color);
            margin-top: 0;
            padding-bottom: 5px;
            font-size: 1.3rem;
        }

        .weather-identity {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
        }

        .large-temp {
            font-size: 4.5rem;
            color: #fff;
            margin: 0;
        }

        .twc-icon {
            width: 96px;
            height: 96px;
            image-rendering: pixelated; /* Keeps crisp 80s pixels on high-res displays */
            background-color: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 1.2rem;
            border-bottom: 1px dotted rgba(255,255,255,0.2);
            padding-bottom: 4px;
        }

        .data-value {
            color: var(--text-accent);
        }

        .alert-mode {
            color: var(--text-alert);
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>SYNOPTIC WEATHER DATA</h1>
            <div id="station-info">STATION: EVANSTON, IL // HQ WORKSTATION</div>
        </div>
        <div class="source-tag" id="api-source">SYS: LOADING...</div>
    </header>

    <main class="grid-container">
        <section class="panel">
            <h2 class="panel-title">MESOSCALE ANALYSIS</h2>
            
            <div class="weather-identity">
                <div class="large-temp" id="display-status">--</div>
                <img id="twc-condition-icon" class="twc-icon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Weather Icon">
            </div>
            
            <div class="data-row">
                <span>CONVECTIVE FLOW:</span>
                <span class="data-value" id="meso-corridor">LOADING...</span>
            </div>
            <div class="data-row">
                <span>HAIL PROBABILITY:</span>
                <span class="data-value" id="hail-prob">--%</span>
            </div>
        </section>

        <section class="panel">
            <h2 class="panel-title">RADAR VORTEX TRACKING</h2>
            <div class="data-row">
                <span>VORTEX LATITUDE:</span>
                <span class="data-value" id="vortex-lat">--</span>
            </div>
            <div class="data-row">
                <span>VORTEX LONGITUDE:</span>
                <span class="data-value" id="vortex-lon">--</span>
            </div>
        </section>
    </main>

    <script>
        // TWC Code Translator Mapper using your explicit string parameters
        function getTWCCode(analysisStr) {
            const text = analysisStr.toLowerCase();
            
            if (text.includes("tornado") || text.includes("vortex")) return "00";
            if (text.includes("severe") || text.includes("hail")) return "03";
            if (text.includes("convective") || text.includes("storm") || text.includes("thunder")) return "04";
            if (text.includes("rain") || text.includes("shower")) return "12";
            if (text.includes("cloudy")) return "26";
            if (text.includes("clear") || text.includes("sunny")) return "32";
            
            return "44"; // Baseline missing/NA code
        }

        // TWC Icon Builder targeting production asset repositories
        function updateTWCIcon(analysisStr) {
            const iconCode = getTWCCode(analysisStr);
            const assetUrl = `https://www.weather.com/wximage/wxdigitalicons/${iconCode}.png`;
            document.getElementById('twc-condition-icon').src = assetUrl;
        }

        // Core Data Processing Logic parsing live_weather_cache.json keys directly
        async function updateDashboard() {
            try {
                const response = await fetch('live_weather_cache.json');
                const data = await response.json();

                // 1. Process System Infrastructure Status Keys
                document.getElementById('api-source').innerText = `SYS: ${data.status}`;
                document.getElementById('display-status').innerText = data.status;

                // 2. Parse the Mesoscale Text Description String
                const mesoAnalysisText = data.meso_analysis;
                document.getElementById('meso-corridor').innerText = mesoAnalysisText;

                // 3. Drill down into the nested provider data matrix payload
                const packageData = data.provider_packaged_data;
                document.getElementById('hail-prob').innerText = packageData.hail_probability + "%";

                // 4. Handle structural validation for coordinates in the array
                if (packageData.radar_vortex_points && packageData.radar_vortex_points.length >= 2) {
                    document.getElementById('vortex-lat').innerText = packageData.radar_vortex_points[0] + "°N";
                    document.getElementById('vortex-lon').innerText = packageData.radar_vortex_points[1] + "°W";
                } else {
                    document.getElementById('vortex-lat').innerText = "NO DATA";
                    document.getElementById('vortex-lon').innerText = "NO DATA";
                }

                // Run the text through the icon translation layer
                updateTWCIcon(mesoAnalysisText);

            } catch (error) {
                console.error("Dashboard engine link error:", error);
                document.getElementById('meso-corridor').innerText = "LINK ERROR / OFFLINE";
                document.getElementById('api-source').innerText = "SYS: ERROR";
            }
        }

        // Initialize dashboard sync sequence loop
        updateDashboard();
        setInterval(updateDashboard, 5000); // 5-second aggressive refresh interval for radar integration tracking
    </script>
</body>
</html>
