<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Expressive Weather | Chicago, IL</title>
    
    <!-- Google Fonts & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    
    <!-- Leaflet for Radar Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', system-ui, -apple-system, sans-serif;
            background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        /* App Container - Mobile First Design */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
        }

        /* Header - AccuWeather Style */
        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .location-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .location-name {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .location-edit {
            font-size: 20px;
            opacity: 0.7;
            cursor: pointer;
        }

        .menu-icon {
            font-size: 24px;
            cursor: pointer;
        }

        /* Main Weather Card - Like AccuWeather */
        .main-weather-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .temperature-section {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .current-temp {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .realfeel {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        .realfeel span {
            color: #ffd700;
        }

        .condition-icon {
            width: 80px;
            height: 80px;
        }

        /* MinuteCast Bar - AccuWeather Feature */
        .minutecast-bar {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 40px;
            padding: 12px 20px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
        }

        .minutecast-icon {
            font-size: 28px;
        }

        .minutecast-text {
            flex: 1;
            font-weight: 500;
        }

        .minutecast-link {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Weather Details Grid */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
            padding: 16px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-item {
            text-align: center;
        }

        .detail-icon {
            font-size: 20px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
        }

        .detail-label {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 2px;
        }

        /* Update Timestamp */
        .update-timestamp {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin: 8px 0;
            padding: 0 8px;
        }

        /* Bottom Navigation - Like AccuWeather */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            padding: 12px 16px 20px;
            max-width: 600px;
            margin: 0 auto;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Google Sans', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 12px;
            border-radius: 24px;
        }

        .nav-item .material-symbols-outlined {
            font-size: 24px;
        }

        .nav-item.active {
            color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        /* Tab Content */
        .tab-content {
            margin-bottom: 80px;
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hourly Scroll */
        .hourly-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 8px 0;
        }

        .hour-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            min-width: 70px;
            backdrop-filter: blur(10px);
        }

        .hour-card img {
            width: 40px;
            height: 40px;
            margin: 8px 0;
        }

        /* Daily Grid */
        .daily-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .day-card img {
            width: 40px;
            height: 40px;
        }

        /* Radar Container */
        .radar-container {
            background: #0a0e27;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .radar-map {
            width: 100%;
            height: 400px;
        }

        .radar-controls {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
        }

        /* Alert Card */
        .alert-card {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
        }

        /* Settings */
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            margin-bottom: 12px;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4fc3f7;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        select {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 24px;
            color: white;
            font-family: 'Google Sans', sans-serif;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 12px;
            }
            .current-temp {
                font-size: 56px;
            }
            .weather-details {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header - AccuWeather Style -->
        <div class="weather-header">
            <div class="location-section">
                <h1 class="location-name" id="locationName">Chicago, IL</h1>
                <span class="material-symbols-outlined location-edit">expand_more</span>
            </div>
            <span class="material-symbols-outlined menu-icon">menu</span>
        </div>

        <!-- Main Weather Card -->
        <div class="main-weather-card">
            <div class="temperature-section">
                <div>
                    <div class="current-temp"><span id="temperature">--</span>°</div>
                    <div class="realfeel">RealFeel® <span id="feelsLike">--</span>°</div>
                </div>
                <img id="weatherIcon" class="condition-icon" src="" alt="weather">
            </div>

            <!-- MinuteCast Bar -->
            <div class="minutecast-bar">
                <span class="material-symbols-outlined minutecast-icon">schedule</span>
                <div class="minutecast-text">
                    <strong>EXCLUSIVE ACCUWEATHER MINUTECAST®</strong><br>
                    <span id="precipStatus">No precipitation for at least 60 min</span>
                </div>
                <span class="minutecast-link">See 4 hours →</span>
            </div>

            <!-- Weather Details Grid -->
            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-icon">💧</div>
                    <div class="detail-value" id="humidity">--%</div>
                    <div class="detail-label">Humidity</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">💨</div>
                    <div class="detail-value" id="windSpeed">-- mph</div>
                    <div class="detail-label">Wind</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">🌡️</div>
                    <div class="detail-value" id="pressure">-- mb</div>
                    <div class="detail-label">Pressure</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">👁️</div>
                    <div class="detail-value" id="visibility">-- mi</div>
                    <div class="detail-label">Visibility</div>
                </div>
            </div>

            <div class="update-timestamp">
                Updated as of <span id="updateTime">--</span>
            </div>
        </div>

        <!-- Tab Content -->
        <div class="tab-content">
            <!-- Today Tab (Dashboard) -->
            <div class="tab-pane active" id="todayTab">
                <div class="weather-details" style="grid-template-columns: repeat(2, 1fr);">
                    <div class="detail-item">
                        <div class="detail-icon">🌅</div>
                        <div class="detail-value" id="sunrise">--</div>
                        <div class="detail-label">Sunrise</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">🌇</div>
                        <div class="detail-value" id="sunset">--</div>
                        <div class="detail-label">Sunset</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">☀️</div>
                        <div class="detail-value" id="uvIndex">--</div>
                        <div class="detail-label">UV Index</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">🌧️</div>
                        <div class="detail-value" id="precipChance">--%</div>
                        <div class="detail-label">Precipitation</div>
                    </div>
                </div>
            </div>

            <!-- Hourly Tab -->
            <div class="tab-pane" id="hourlyTab">
                <div class="hourly-scroll" id="hourlyForecast"></div>
            </div>

            <!-- Daily Tab -->
            <div class="tab-pane" id="dailyTab">
                <div class="daily-grid" id="dailyForecast"></div>
            </div>

            <!-- Radar Tab -->
            <div class="tab-pane" id="radarTab">
                <div class="radar-container">
                    <div id="radarMap" class="radar-map"></div>
                    <div class="radar-controls">
                        <select id="radarProductSelect" style="flex: 1;">
                            <option value="reflectivity">Reflectivity</option>
                            <option value="velocity">Base Velocity</option>
                        </select>
                        <button id="refreshRadarBtn" style="background: rgba(255,255,255,0.2); border: none; border-radius: 24px; padding: 8px 16px; color: white; cursor: pointer;">
                            <span class="material-symbols-outlined" style="font-size: 20px;">refresh</span>
                        </button>
                    </div>
                </div>
                <div class="alert-card" id="alertSummary" style="display: none;"></div>
            </div>

            <!-- Alerts Tab -->
            <div class="tab-pane" id="alertsTab">
                <div id="alertsContainer"></div>
            </div>

            <!-- Settings Tab -->
            <div class="tab-pane" id="settingsTab">
                <div class="setting-item">
                    <label>🌓 Dark Mode</label>
                    <label class="switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>📢 Alert Notifications</label>
                    <label class="switch">
                        <input type="checkbox" id="notificationToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>📍 Units</label>
                    <select id="unitSelect">
                        <option value="f">°F / mph</option>
                        <option value="c">°C / km/h</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>🔄 Refresh Interval</label>
                    <select id="refreshSelect">
                        <option value="5">5 minutes</option>
                        <option value="15">15 minutes</option>
                        <option value="30" selected>30 minutes</option>
                        <option value="60">60 minutes</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation - AccuWeather Style -->
        <div class="bottom-nav">
            <button class="nav-item active" data-tab="today">
                <span class="material-symbols-outlined">home</span>
                <span>Home</span>
            </button>
            <button class="nav-item" data-tab="hourly">
                <span class="material-symbols-outlined">schedule</span>
                <span>Hourly</span>
            </button>
            <button class="nav-item" data-tab="daily">
                <span class="material-symbols-outlined">calendar_month</span>
                <span>Daily</span>
            </button>
            <button class="nav-item" data-tab="radar">
                <span class="material-symbols-outlined">radar</span>
                <span>Radar</span>
            </button>
            <button class="nav-item" data-tab="alerts">
                <span class="material-symbols-outlined">warning</span>
                <span>Alerts</span>
            </button>
            <button class="nav-item" data-tab="settings">
                <span class="material-symbols-outlined">settings</span>
                <span>Settings</span>
            </button>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
